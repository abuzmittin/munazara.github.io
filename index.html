<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Münazara | Çalışmanın Gücü</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: #0f0f1a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 198, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(0, 114, 255, 0.15) 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            z-index: 1;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .video-container {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(0, 198, 255, 0.2);
        }

        video { width: 100%; display: block; }

        .stats { margin: 20px 0; }

        #count-number {
            font-size: 4rem;
            font-weight: 800;
            color: #00c6ff;
            text-shadow: 0 0 20px rgba(0, 198, 255, 0.5);
            display: block;
        }

        .btn-like {
            padding: 15px 45px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
        }

        /* Footer ve Gizli Tetikleyici */
        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        .secret-trigger {
            cursor: pointer;
            transition: color 0.3s;
            display: inline-block;
        }

        .secret-trigger:hover { color: #00c6ff; }

        /* Gizli Video Katmanı */
        #bomba-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 9999;
            display: none; /* Başlangıçta gizli */
            justify-content: center;
            align-items: center;
        }

        #bomba-overlay video { width: 100%; height: 100%; object-fit: contain; }

        .close-bomba {
            position: absolute;
            top: 20px; right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10000;
            opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div id="bomba-overlay">
        <span class="close-bomba" onclick="closeBomba()">&times;</span>
        <video id="bomba-video">
            <source src="https://calismak-yararlidir.netlify.app/bomba.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <h1>Çalışmak Yararlıdır!</h1>
        
        <div class="video-container">
            <video id="main-video" controls autoplay muted loop>
                <source src="https://calismak-yararlidir.netlify.app/tanitim.mp4" type="video/mp4">
            </video>
        </div>

        <div class="stats">
            <span style="opacity: 0.7;">Toplam Beğeni Sayısı</span>
            <span id="count-number">...</span>
        </div>

        <button class="btn-like" id="likeBtn">Beğendiysen Tıkla!</button>

        <p class="footer">
            TÜM HAKLARI SAKLIDIR <span class="secret-trigger" onclick="launchBomba()">©</span> 2026 ATA, NADİR, UMUT, DERİN
        </p>
    </div>

    <script>
        const countEl = document.getElementById('count-number');
        const btn = document.getElementById('likeBtn');
        const overlay = document.getElementById('bomba-overlay');
        const bombaVideo = document.getElementById('bomba-video');
        const mainVideo = document.getElementById('main-video');

        // CounterAPI Ayarları
        const apiUrl = "https://api.counterapi.dev/v1/munazara-2026/calismak-yararlidir";

        async function fetchCount() {
            try {
                const r = await fetch(apiUrl);
                const d = await r.json();
                countEl.innerText = d.count || 0;
            } catch { countEl.innerText = "0"; }
        }

        async function incrementCount() {
            btn.disabled = true;
            try {
                const r = await fetch(apiUrl + "/up");
                const d = await r.json();
                countEl.innerText = d.count;
                btn.disabled = false;
            } catch { btn.disabled = false; }
        }

        // GİZLİ FONKSİYONLAR
        function launchBomba() {
            mainVideo.pause(); // Ana videoyu durdur
            overlay.style.display = 'flex';
            bombaVideo.play();
            
            // Video bittiğinde otomatik kapat
            bombaVideo.onended = () => { closeBomba(); };
        }

        function closeBomba() {
            bombaVideo.pause();
            bombaVideo.currentTime = 0;
            overlay.style.display = 'none';
            mainVideo.play(); // Ana videoyu devam ettir
        }

        btn.addEventListener('click', incrementCount);
        fetchCount();
    </script>
</body>
</html>
